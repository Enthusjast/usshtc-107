appId: com.ustc.usshtc107
productName: "usshtc107"
copyright: "Copyright 2026"
forceCodeSigning: false

directories:
  output: release
  buildResources: build

files:
  - electron/**/*
  - dist/**/*
  - package.json

asar: true

linux:
  target:
    - AppImage
    - deb
  category: Network
  icon: build/icon.png

mac:
  target:
    - dmg
  category: public.app-category.utilities
  icon: build/icon.icns

win:
  target:
    - target: nsis
      arch: [x64]
  # No icon embedding on cross-build (would need wine+rcedit)
  signAndEditExecutable: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
