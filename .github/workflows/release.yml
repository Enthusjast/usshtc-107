name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - linux
          - mac
          - win
      release:
        description: 'Create GitHub Release'
        required: false
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux

          - os: macos-latest
            target: mac

          - os: windows-latest
            target: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check platform filter
        if: >-
          github.event_name != 'push' &&
          github.event.inputs.platform != 'all' &&
          github.event.inputs.platform != matrix.target
        run: echo "Skipping ${{ matrix.target }}"

      - uses: actions/checkout@v4
        if: >-
          github.event_name == 'push' ||
          github.event.inputs.platform == 'all' ||
          github.event.inputs.platform == matrix.target

      - uses: actions/setup-node@v4
        if: >-
          github.event_name == 'push' ||
          github.event.inputs.platform == 'all' ||
          github.event.inputs.platform == matrix.target
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        if: >-
          github.event_name == 'push' ||
          github.event.inputs.platform == 'all' ||
          github.event.inputs.platform == matrix.target

      - run: npm run build
        if: >-
          github.event_name == 'push' ||
          github.event.inputs.platform == 'all' ||
          github.event.inputs.platform == matrix.target

      # macOS: generate .icns from .png before electron-builder runs
      - name: Generate macOS icon
        if: matrix.target == 'mac'
        run: |
          mkdir -p build
          sips -s format icns build/icon.png --out build/icon.icns

      # Linux: install AppImage build deps
      - name: Install Linux deps
        if: matrix.target == 'linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libfuse2

      # Cache electron-builder downloads (NSIS, Wine, etc.)
      - name: Cache electron-builder
        if: >-
          github.event_name == 'push' ||
          github.event.inputs.platform == 'all' ||
          github.event.inputs.platform == matrix.target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-builder-${{ matrix.target }}-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-builder-${{ matrix.target }}-${{ runner.os }}-

      - name: Package ${{ matrix.target }}
        if: >-
          github.event_name == 'push' ||
          github.event.inputs.platform == 'all' ||
          github.event.inputs.platform == matrix.target
        run: npx electron-builder --${{ matrix.target }} --publish never

      # Remove auto-update metadata (not needed in release assets)
      - name: Clean release artifacts
        if: >-
          github.event_name == 'push' ||
          github.event.inputs.platform == 'all' ||
          github.event.inputs.platform == matrix.target
        shell: bash
        run: |
          cd release
          rm -f *.yml *.yaml *.blockmap
          ls -lh .

      - uses: actions/upload-artifact@v4
        if: >-
          github.event_name == 'push' ||
          github.event.inputs.platform == 'all' ||
          github.event.inputs.platform == matrix.target
        with:
          name: usshtc107-${{ matrix.target }}
          path: release/*
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.release == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: usshtc107-*
          merge-multiple: true
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
