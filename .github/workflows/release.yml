name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux

          - os: macos-latest
            target: mac

          - os: windows-latest
            target: win

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      # macOS: generate .icns from .png before electron-builder runs
      - name: Generate macOS icon
        if: matrix.target == 'mac'
        run: |
          mkdir -p build
          sips -s format icns build/icon.png --out build/icon.icns

      # Linux: install AppImage build deps
      - name: Install Linux deps
        if: matrix.target == 'linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libfuse2

      - name: Package ${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --${{ matrix.target }} --publish never

      # Remove auto-update metadata (not needed in release assets)
      - name: Clean release artifacts
        shell: bash
        run: |
          cd release
          rm -f *.yml *.yaml *.blockmap
          ls -lh .

      - uses: actions/upload-artifact@v4
        with:
          name: usshtc107-${{ matrix.target }}
          path: release/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: usshtc107-*
          merge-multiple: true
          path: artifacts

      # Remove any metadata that slipped through
      - name: Clean collected artifacts
        shell: bash
        run: |
          find artifacts \( -name '*.yml' -o -name '*.yaml' -o -name '*.blockmap' \) -delete
          ls -lhR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
